<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TOEIC Practice Suite - Part 3 Test 2</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');

        :root {
            --navy: #0d1b2a; --navy-light: #162840; --gold: #c8993a; --gold-l: #e8b84b;
            --bg-cream: #f8f4ed; --text-dark: #1a1a2e; --muted: #6b7280;
            --correct: #1a7a4a; --correct-bg: #d1fae5;
            --wrong: #b91c1c; --wrong-bg: #fee2e2;
        }

        *{box-sizing:border-box; margin:0; padding:0;}
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-cream); color: var(--text-dark); padding: 40px 20px; }
        main { max-width: 850px; margin: 0 auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); border: 1px solid #d4c5a9; margin-top: 20px; }
        
        .header-title { font-family: 'Playfair Display', 'Merriweather', serif; font-size: 2rem; color: var(--navy); margin-bottom: 8px; }
        .header-sub { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; color: var(--gold); letter-spacing: 0.05em; margin-bottom: 30px; text-transform: uppercase; }
        
        /* BARRE AUDIO PERMANENTE STYLE PART 4 */
        .audio-player-container {
            background: var(--navy);
            border-bottom: 3px solid var(--gold);
            padding: 16px 24px;
            border-radius: 8px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 20px;
            flex-wrap: wrap;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        .audio-label {
            font-family: 'JetBrains Mono', monospace;
            color: var(--gold-l);
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .audio-element {
            flex: 1;
            min-width: 260px;
            height: 32px;
        }

        .conversation-block { background: #faf8f5; border: 1px solid #e8e2d5; border-radius: 8px; padding: 25px; margin-bottom: 35px; }
        .context-indicator { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--muted); text-transform: uppercase; margin-bottom: 15px; border-bottom: 1px dashed #e8e2d5; padding-bottom: 5px; }
        
        /* PANNEAUX GRAPHICS INTERACTIFS */
        .inline-graphic-wrapper { margin: 15px 0 25px 0; }
        .blink-btn {
            background-color: var(--wrong); color: white; border: none; padding: 12px 20px;
            border-radius: 6px; cursor: pointer; font-weight: 700; width: 100%; text-transform: uppercase;
            font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; letter-spacing: 0.05em;
        }
        .graphic-content { display: none; background: white; padding: 20px; border: 2px dashed var(--gold); border-radius: 6px; margin-top: 10px; text-align: center; }
        .graphic-img-placeholder { display: inline-block; padding: 15px 30px; background: #f3f4f6; border-radius: 4px; font-weight: bold; font-family: monospace; border: 1px solid #e5e7eb; margin-top: 10px; color: var(--navy); }

        .question-item { margin-bottom: 20px; }
        .question-text { font-weight: 600; margin-bottom: 10px; color: var(--navy-light); }
        
        .options-list { list-style: none; display: grid; grid-template-columns: 1fr; gap: 8px; }
        .option-label { display: flex; align-items: center; padding: 10px 15px; background: white; border: 1px solid #e2d8c5; border-radius: 6px; cursor: pointer; transition: background 0.2s; }
        .option-label:hover { background: var(--bg-cream); }
        .option-label input { margin-right: 12px; transform: scale(1.1); }

        .action-container { text-align: center; margin-top: 40px; }
        .submit-btn { background: var(--navy); color: white; border: none; padding: 15px 40px; border-radius: 6px; font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .submit-btn:hover { background: var(--navy-light); border-bottom: 2px solid var(--gold); }

        /* DECORATION CORRECTION */
        .correction-box { display: none; margin-top: 40px; padding-top: 30px; border-top: 3px double var(--gold); }
        .score-banner { font-family: 'JetBrains Mono', monospace; font-size: 1.5rem; text-align: center; padding: 20px; background: var(--navy); color: white; border-radius: 8px; margin-bottom: 30px; }
        .corr-block { border-left: 4px solid var(--gold); padding-left: 20px; margin-bottom: 40px; }
        .transcript-box { background: #f0ead8; padding: 15px; border-radius: 6px; font-size: 0.9rem; margin-bottom: 15px; font-style: italic; color: #333; }
        .cq-item { background: #fff; border: 1px solid #e5e7eb; border-radius: 6px; padding: 15px; margin-bottom: 15px; }
        .cq-text { font-weight: bold; margin-bottom: 10px; }
        .cq-opt { padding: 8px 12px; border-radius: 4px; margin-bottom: 4px; font-size: 0.9rem; }
        .cq-opt.correct { background: var(--correct-bg); color: var(--correct); font-weight: 600; }
        .cq-opt.wrong { background: var(--wrong-bg); color: var(--wrong); text-decoration: line-through; }
        .expl { font-size: 0.88rem; margin-top: 10px; color: #444; background: #f9f9f9; padding: 10px; border-radius: 4px; }
        .vocab { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; margin-top: 5px; color: #6b7280; padding-left: 10px; }
    </style>
</head>

    function toggleGraphic(id, btn) {
        const target = document.getElementById(id);
        if (target.style.display === "block") {
            target.style.display = "none";
            btn.textContent = "⚠️ Look at the graphic — click here";
        } else {
            target.style.display = "block";
            btn.textContent = "Hide graphic window";
        }
    }

    function renderQuiz() {
        const container = document.getElementById('questions-target');
        let html = '';

        dataset.forEach((block, bIdx) => {
            html += `<div class="conversation-block">`;
            html += `<div class="context-indicator">${block.context}</div>`;
            
            if (block.hasGraphic) {
                html += `
                    <div class="inline-graphic-wrapper">
                        <button type="button" class="blink-btn" onclick="toggleGraphic('${block.graphicId}', this)">⚠️ Look at the graphic — click here</button>
                        <div id="${block.graphicId}" class="graphic-content">
                            <strong>${block.graphicTitle}</strong><br>
                            <div class="graphic-img-placeholder">${block.graphicData}</div>
                        </div>
                    </div>
                `;
            }

            block.questions.forEach(q => {
                html += `
                    <div class="question-item">
                        <p class="question-text">${q.id}. ${q.text}</p>
                        <div class="options-list">
                `;
                Object.keys(q.options).forEach(opt => {
                    html += `
                        <label class="option-label">
                            <input type="radio" name="q${q.id}" value="${opt}" required>
                            <span>(${opt}) ${q.options[opt]}</span>
                        </label>
                    `;
                });
                html += `</div></div>`;
            });

            html += `</div>`;
        });

        container.innerHTML = html;
    }

    function evaluateQuiz(e) {
        e.preventDefault();
        const formData = new FormData(document.getElementById('quiz-form'));
        const userAnswers = {};
        let score = 0;
        let totalQuestions = 0;

        dataset.forEach(block => {
            block.questions.forEach(q => {
                userAnswers[`q${q.id}`] = formData.get(`q${q.id}`);
                totalQuestions++;
                if(userAnswers[`q${q.id}`] === q.correct) score++;
            });
        });

        const corrTarget = document.getElementById('correction-target');
        corrTarget.style.display = "block";

        let corrHtml = `
            <div class="score-banner">
                Score final : ${score} / ${totalQuestions} (${Math.round((score/totalQuestions)*100)}%)
            </div>
            <h2 style="margin-bottom:20px; font-family: 'Merriweather', serif;">Correction détaillée</h2>
        `;

        dataset.forEach(block => {
            corrHtml += `
                <div class="corr-block">
                    <div class="context-indicator">${block.range} · Script Audio</div>
                    <div class="transcript-box">${block.transcript.replace(/\n/g, '<br>')}</div>
            `;

            block.questions.forEach(q => {
                const userAns = userAnswers[`q${q.id}`];
                corrHtml += `
                    <div class="cq-item">
                        <div class="cq-text">${q.id}. ${q.text}</div>
                `;

                Object.keys(q.options).forEach(opt => {
                    let statusClass = '';
                    if (opt === q.correct) statusClass = 'correct';
                    else if (opt === userAns && opt !== q.correct) statusClass = 'wrong';

                    corrHtml += `
                        <div class="cq-opt ${statusClass}">
                            <strong>(${opt})</strong> ${q.options[opt]} ${opt === q.correct ? ' ✓' : ''}
                        </div>
                    `;
                });

                corrHtml += `
                        <div class="expl"><strong>Explication :</strong> ${q.expl}</div>
                        <div class="vocab">💡 ${q.vocab}</div>
                    </div>
                `;
            });

            corrHtml += `</div>`;
        });

        corrTarget.innerHTML = corrHtml;
        corrTarget.scrollIntoView({ behavior: 'smooth' });
    }

    renderQuiz();
</script>
